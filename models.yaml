# Models under test. Add open-weight models by setting provider: openai_compatible and
# pointing base_url at Together / Fireworks / OpenRouter / vLLM / etc.
#
# `id` is the stable key used in results/runs.jsonl and the report — don't rename it after
# data has been collected; add a new entry instead.

models:
  - id: claude-opus-4-7
    provider: anthropic
    model_id: claude-opus-4-7
    display_name: Claude Opus 4.7

  - id: claude-sonnet-4-6
    provider: anthropic
    model_id: claude-sonnet-4-6
    display_name: Claude Sonnet 4.6

  - id: claude-haiku-4-5
    provider: anthropic
    model_id: claude-haiku-4-5-20251001
    display_name: Claude Haiku 4.5

  - id: gpt-5
    provider: openai
    model_id: gpt-5
    display_name: GPT-5

  - id: gpt-5-mini
    provider: openai
    model_id: gpt-5-mini
    display_name: GPT-5 mini

  - id: gemini-2.5-pro
    provider: google
    model_id: gemini-2.5-pro
    display_name: Gemini 2.5 Pro

  - id: gemini-2.5-flash
    provider: google
    model_id: gemini-2.5-flash
    display_name: Gemini 2.5 Flash

  # --- open-weight models via OpenRouter ---
  - id: deepseek-v3.2
    provider: openai_compatible
    model_id: deepseek/deepseek-v3.2
    display_name: DeepSeek V3.2
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  - id: qwen3-coder
    provider: openai_compatible
    model_id: qwen/qwen3-coder
    display_name: Qwen3 Coder 480B
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  - id: llama-4-maverick
    provider: openai_compatible
    model_id: meta-llama/llama-4-maverick
    display_name: Llama 4 Maverick
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

  # Other OpenAI-compatible hosts work the same way — point base_url at Together /
  # Fireworks / DeepInfra / vLLM / Ollama (http://localhost:11434/v1) and set the env var.
